# ─────────────────────────────────────────────────────────────────────────────
# D.A.N. — Dynamic Access Node  — Render deployment
# Everything runs as ONE free web service: dashboard UI + API + web terminal
# (ttyd) + SSH devbox, all on the single $PORT Render exposes.
#
# Deploy: connect this repo in Render dashboard → "New Blueprint"
#
# Required secrets to set in Render dashboard (Environment tab):
#   DATABASE_URL        — Render PostgreSQL external connection string
#   SESSION_SECRET      — random string (openssl rand -hex 32)
#   WEB_TERMINAL_USER   — login username for the web terminal
#   WEB_TERMINAL_PASS   — login password for the web terminal
#
# Everything else below is optional (SSH tunnels, GitHub persistence).
#
# Note on SSH access:
#   Render free tier only routes HTTP/HTTPS to $PORT. The web terminal
#   (ttyd) is served at /webterm on your app's URL — no extra ports needed.
#   For raw SSH from a phone/laptop, use the Cloudflare Tunnel or bore.pub
#   options below (both free, both work on the free plan).
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: dan
    runtime: docker
    dockerContext: .
    dockerfilePath: ./ssh-container/Dockerfile
    plan: free
    healthCheckPath: /api/healthz
    envVars:
      # ── Core app ──────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard
      - key: SESSION_SECRET
        sync: false          # set manually in Render dashboard

      # ── Web terminal (served at /webterm on this same service) ─────────────
      - key: WEB_TERMINAL_USER
        sync: false          # terminal login username
      - key: WEB_TERMINAL_PASS
        sync: false          # terminal login password
      - key: DEV_USER
        value: devuser
      - key: AUTO_INSTALL_EXTRAS
        value: "no"          # set to "yes" to install Metasploit etc. on first boot

      # ── SSH via Cloudflare Tunnel (recommended — permanent hostname, free) ──
      #   1. dash.cloudflare.com → Zero Trust → Networks → Tunnels → Create tunnel
      #   2. Paste the tunnel token below
      #   3. Add a Public Hostname in the tunnel: hostname=dan.yourdomain.com, service=ssh://localhost:22
      #   4. SSH: ssh -o "ProxyCommand cloudflared access ssh --hostname %h" devuser@dan.yourdomain.com
      - key: CLOUDFLARE_TUNNEL_TOKEN
        sync: false          # paste your tunnel token from Cloudflare dashboard

      # ── SSH via bore.pub (zero-config fallback, no account needed) ──────────
      #   After boot, run in the web terminal: cat ~/.dan_ssh_connect
      - key: BORE_ENABLE
        value: "yes"         # set to "no" to disable bore tunnel
      - key: BORE_SECRET
        sync: false          # set any string for a consistent port across restarts

      # ── GitHub persistence (survives Render free-tier disk wipes) ───────────
      - key: GITHUB_TOKEN
        sync: false          # GitHub PAT with repo scope
      - key: DOTFILES_REPO
        sync: false          # e.g. github.com/daviddan-241/dan-dotfiles
      - key: PROJECTS_REPO
        sync: false          # e.g. github.com/daviddan-241/dan-projects (optional)
