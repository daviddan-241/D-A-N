# ─────────────────────────────────────────────────────────────────────────────
# D.A.N. — proxychains4 config
# Routes all proxychains-wrapped tools through Tor.
# Usage: proxychains4 <command>
# ─────────────────────────────────────────────────────────────────────────────

# Strict: every connection goes through the full chain
strict_chain

# Proxy DNS requests through the chain (prevents DNS leaks)
proxy_dns

# Timeouts (ms)
tcp_read_time_out 15000
tcp_connect_time_out 8000

# Quiet mode (less noise)
quiet_mode

[ProxyList]
# Tor SOCKS5
socks5  127.0.0.1 9050
