version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# SSH Development Container — Docker Compose
# ─────────────────────────────────────────────────────────────────────────────

services:
  devbox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DEV_USER: ${DEV_USER:-devuser}
        DEV_UID: ${DEV_UID:-1000}
        DEV_GID: ${DEV_GID:-1000}
    image: devbox:latest
    container_name: devbox

    # ── Restart policy ─────────────────────────────────────────────────────────
    restart: unless-stopped

    # ── Port mapping ───────────────────────────────────────────────────────────
    ports:
      - "${SSH_PORT:-2222}:22"

    # ── Persistent volumes ─────────────────────────────────────────────────────
    volumes:
      # User home directory — persists projects, dotfiles, git repos
      - devbox_home:/home/${DEV_USER:-devuser}
      # SSH host keys — keep consistent identity across restarts
      - devbox_host_keys:/etc/ssh/host_keys
      # Logs
      - devbox_logs:/var/log/ssh-container
      # Mount host Docker socket for Docker-in-Docker (optional; comment out if unwanted)
      # - /var/run/docker.sock:/var/run/docker.sock

    # ── Environment ────────────────────────────────────────────────────────────
    environment:
      - TZ=${TZ:-UTC}
      - DEV_USER=${DEV_USER:-devuser}
      # Set to "yes" on first run to initialise SSH host keys; safe to leave on
      - INIT_HOST_KEYS=yes

    # ── Security options ───────────────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
    # Drop all capabilities; re-add the minimum set required
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
      - SYS_CHROOT       # needed by OpenSSH
      - AUDIT_WRITE      # needed by PAM/auth logging
      - DAC_OVERRIDE     # needed by sshd to read authorized_keys
      # Required for fail2ban / ufw / iptables inside the container:
      - NET_ADMIN        # iptables rule management
      - NET_RAW          # raw socket access for iptables

    # ── Limits ─────────────────────────────────────────────────────────────────
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    # ── Health check ───────────────────────────────────────────────────────────
    healthcheck:
      test: ["/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    # ── Logging ────────────────────────────────────────────────────────────────
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  devbox_home:
    driver: local
    labels:
      com.devbox.description: "Developer home directory"
  devbox_host_keys:
    driver: local
    labels:
      com.devbox.description: "SSH server host keys"
  devbox_logs:
    driver: local
    labels:
      com.devbox.description: "Container log files"

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
