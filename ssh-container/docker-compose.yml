version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# D.A.N. — Dynamic Access Node
# Hardened SSH + Web Terminal + Security Research Container
# ─────────────────────────────────────────────────────────────────────────────

services:
  devbox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DEV_USER: ${DEV_USER:-devuser}
        DEV_UID: ${DEV_UID:-1000}
        DEV_GID: ${DEV_GID:-1000}
    image: dan-devbox:latest
    container_name: dan-devbox
    hostname: dan-devbox

    # ── Restart policy ─────────────────────────────────────────────────────────
    restart: unless-stopped

    # ── Port mapping ───────────────────────────────────────────────────────────
    ports:
      - "${SSH_PORT:-2222}:22"          # SSH
      - "${TTYD_PORT:-7681}:7681"       # ttyd web terminal

    # ── Persistent volumes ─────────────────────────────────────────────────────
    volumes:
      # User home — projects, dotfiles, git repos, tool data
      - devbox_home:/home/${DEV_USER:-devuser}
      # SSH host keys — consistent server identity across restarts
      - devbox_host_keys:/etc/ssh/host_keys
      # Logs
      - devbox_logs:/var/log/ssh-container
      # Nuclei templates cache
      - devbox_nuclei:/root/nuclei-templates
      # Optional: host Docker socket for DinD (comment out if unwanted)
      # - /var/run/docker.sock:/var/run/docker.sock

    # ── Environment ────────────────────────────────────────────────────────────
    environment:
      - TZ=${TZ:-UTC}
      - DEV_USER=${DEV_USER:-devuser}
      - INIT_HOST_KEYS=yes
      # Web terminal basic auth (required — do not leave blank in production)
      - WEB_TERMINAL_USER=${WEB_TERMINAL_USER:-dan}
      - WEB_TERMINAL_PASS=${WEB_TERMINAL_PASS:-changeme}
      # Set to "yes" to run Metasploit/Amass/etc install on first boot (slow, optional)
      - AUTO_INSTALL_EXTRAS=${AUTO_INSTALL_EXTRAS:-no}

    # ── Security options ───────────────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
      - SYS_CHROOT       # OpenSSH
      - AUDIT_WRITE      # PAM/auth logging
      - DAC_OVERRIDE     # read authorized_keys
      - NET_ADMIN        # iptables / fail2ban / ufw
      - NET_RAW          # raw sockets for iptables

    # ── Resource limits ────────────────────────────────────────────────────────
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    # ── Health check ───────────────────────────────────────────────────────────
    healthcheck:
      test: ["/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    # ── Logging ────────────────────────────────────────────────────────────────
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  devbox_home:
    driver: local
    labels:
      com.dan.description: "Developer home directory (projects + dotfiles)"
  devbox_host_keys:
    driver: local
    labels:
      com.dan.description: "SSH server host keys"
  devbox_logs:
    driver: local
    labels:
      com.dan.description: "Container log files"
  devbox_nuclei:
    driver: local
    labels:
      com.dan.description: "Nuclei vulnerability templates cache"

# ── Network ────────────────────────────────────────────────────────────────────
networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
